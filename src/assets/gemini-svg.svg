<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    "Adult" Tic-Tac-Toe Concept
    Theme: Cyberpunk/Neon Dark Mode
    Palette: Neon Cyan, Neon Magenta, Deep Gray
  -->

  <!-- Background Layer -->
  <rect width="300" height="300" rx="15" fill="#121212"/>
  
  <!-- The 3x3 Grid Lines -->
  <g stroke="#333333" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="30" x2="100" y2="270" /> <!-- Vert 1 -->
    <line x1="200" y1="30" x2="200" y2="270" /> <!-- Vert 2 -->
    <line x1="30" y1="100" x2="270" y2="100" /> <!-- Horiz 1 -->
    <line x1="30" y1="200" x2="270" y2="200" /> <!-- Horiz 2 -->
  </g>

  <!-- Define Glow Filters for the Pieces -->
  <defs>
    <!-- Cyan Glow for X -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00F2FF" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Magenta Glow for O -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FF007A" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Player X Pieces (Neon Cyan) -->
  <g stroke="#00F2FF" stroke-width="6" stroke-linecap="round" filter="url(#cyanGlow)">
    <!-- Piece at [0,0] (Top Left) -->
    <path d="M35 35L65 65M65 35L35 65"/>
    
    <!-- Piece at [0,2] (Top Right) -->
    <path d="M235 35L265 65M265 35L235 65"/>
    
    <!-- Piece at [1,1] (Center) -->
    <path d="M135 135L165 165M165 135L135 165"/>
    
    <!-- Piece at [2,2] (Bottom Right) -->
    <path d="M235 235L265 265M265 235L235 265"/>
  </g>

  <!-- Player O Pieces (Neon Magenta) -->
  <g stroke="#FF007A" stroke-width="6" filter="url(#pinkGlow)">
    <!-- Piece at [0,1] (Top Middle) -->
    <circle cx="150" cy="50" r="18"/>
    
    <!-- Piece at [1,0] (Center Left) -->
    <circle cx="50" cy="150" r="18"/>
    
    <!-- Piece at [2,0] (Bottom Left) -->
    <circle cx="50" cy="250" r="18"/>
  </g>
</svg>
